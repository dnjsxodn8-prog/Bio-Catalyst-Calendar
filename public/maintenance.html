<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>점검 중 — Bio Catalyst Calendar</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #08090c;
        --panel: #11141b;
        --line: #1f2531;
        --ink: #e8ebf2;
        --ink-2: #b6bccb;
        --ink-3: #6e7689;
        --acc: #6ee7b7;
        --acc-2: #34d399;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        min-height: 100%;
      }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: 'Inter', 'Pretendard Variable', -apple-system, BlinkMacSystemFont,
          'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Apple SD Gothic Neo',
          'Malgun Gothic', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        position: relative;
        overflow: hidden;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(900px 600px at 12% -10%, rgba(110, 231, 183, 0.07), transparent 60%),
          radial-gradient(800px 500px at 95% 0%, rgba(96, 165, 250, 0.05), transparent 60%),
          linear-gradient(180deg, #0a0c11 0%, #08090c 100%);
        pointer-events: none;
        z-index: 0;
      }
      .card {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 480px;
        background: linear-gradient(180deg, rgba(22, 26, 35, 0.7), rgba(17, 20, 27, 0.7));
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 44px 36px 40px;
        text-align: center;
        box-shadow: 0 30px 80px -40px rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(6px);
      }
      .mark {
        width: 60px;
        height: 60px;
        margin: 0 auto 26px;
        border-radius: 16px;
        border: 1px solid rgba(110, 231, 183, 0.28);
        background: radial-gradient(120% 120% at 30% 20%, rgba(110, 231, 183, 0.16), rgba(17, 20, 27, 0.6));
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .mark svg {
        width: 34px;
        height: 34px;
      }
      .pulse-line {
        stroke: var(--acc);
        stroke-width: 2.4;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        stroke-dasharray: 120;
        stroke-dashoffset: 120;
        animation: draw 2.4s ease-in-out infinite;
      }
      @keyframes draw {
        0% {
          stroke-dashoffset: 120;
        }
        45% {
          stroke-dashoffset: 0;
        }
        75% {
          stroke-dashoffset: 0;
        }
        100% {
          stroke-dashoffset: -120;
        }
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--acc);
        background: rgba(110, 231, 183, 0.08);
        border: 1px solid rgba(110, 231, 183, 0.22);
        border-radius: 999px;
        padding: 6px 13px;
        margin-bottom: 22px;
      }
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--acc);
        box-shadow: 0 0 0 0 rgba(110, 231, 183, 0.6);
        animation: blink 1.8s ease-in-out infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
          box-shadow: 0 0 0 0 rgba(110, 231, 183, 0.5);
        }
        50% {
          opacity: 0.5;
          box-shadow: 0 0 0 6px rgba(110, 231, 183, 0);
        }
      }
      h1 {
        font-size: 24px;
        font-weight: 700;
        line-height: 1.35;
        letter-spacing: -0.01em;
        margin-bottom: 10px;
      }
      h1 .en {
        display: block;
        font-size: 15px;
        font-weight: 500;
        color: var(--ink-3);
        margin-top: 6px;
        letter-spacing: 0;
      }
      p {
        font-size: 14.5px;
        line-height: 1.7;
        color: var(--ink-2);
        margin: 0 auto;
        max-width: 340px;
      }
      p .en {
        display: block;
        font-size: 13px;
        color: var(--ink-3);
        margin-top: 8px;
      }
      .foot {
        margin-top: 30px;
        padding-top: 22px;
        border-top: 1px solid var(--line);
        font-size: 13px;
        font-weight: 600;
        color: var(--ink);
        letter-spacing: 0.01em;
      }
      .foot span {
        color: var(--acc-2);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="mark" aria-hidden="true">
        <svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
          <path
            class="pulse-line"
            d="M3 24 H13 L17 12 L23 34 L28 20 L31 24 H41"
          />
        </svg>
      </div>
      <div class="badge"><span class="dot"></span>Maintenance</div>
      <h1>
        잠시 점검 중입니다
        <span class="en">We&rsquo;ll be right back</span>
      </h1>
      <p>
        더 나은 카탈리스트 추적 경험을 위해 시스템을 업데이트하고 있습니다. 곧 정상적으로 돌아올게요.
        <span class="en">We&rsquo;re updating the site and will be back online shortly. Thanks for your patience.</span>
      </p>
      <div class="foot">Bio Catalyst <span>Calendar</span></div>
    </main>
  </body>
</html>
